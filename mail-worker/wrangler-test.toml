name = "test-mail"
main = "src/index.js"
compatibility_date = "2025-06-04"
keep_vars = true

[observability]
enabled = true

[[d1_databases]]
binding = "db"			# D1 database binding name (do not modify)
database_name = "test-email"		# D1 database name
database_id = "e65f099d-796d-4eaa-8dff-529b368b20db"		# D1 database ID

[[kv_namespaces]]
binding = "kv"			# KV binding name (do not modify)
id = "9be10cd058e04c55b526f8c0c116f50c"					# KV namespace ID

# (Optional)
#[[r2_buckets]]
#binding = "r2"			# R2 bucket binding name (do not modify)
#bucket_name = "test-email"		# R2 bucket name

[ai]
binding = "ai"

[assets]
binding = "assets"		# Static assets binding name (do not modify)
directory = "./dist"	# Vue frontend build output directory, default: dist
not_found_handling = "single-page-application"
run_worker_first = true

[triggers]
crons = ["0 16 * * *"]	# Run daily tasks at midnight (UTC) to refresh analysis cache


[vars]
ai_model = ""			# AI model, defaults to @cf/meta/llama-3.1-8b-instruct if empty
analysis_cache = false			# Enable analysis data caching
orm_log = false			# Enable SQL logging
domain = ["example.com"]				# Email domains, multiple allowed. Example: ["example1.com","example2.com"]
admin = "admin@example.com"				# Admin email. Example: admin@example.com
jwt_secret = "b7f29a1d-18e2-4d3b-941f-f6b2c97c02fd"			# JWT secret key, enter a random string

[build]
command = "pnpm --prefix ../mail-vue install && pnpm --prefix ../mail-vue run build"
